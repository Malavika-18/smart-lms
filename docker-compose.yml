version: '3.8'

services:

  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: smart_lms_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: smart_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_lms_backend
    environment:
      DATABASE_URL: postgresql://postgres:admin123@db:5432/smart_lms
      SECRET_KEY: your_super_secret_key_change_this_in_production_2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_lms_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
