services:
  # Backend API Service
  - type: web
    name: smart-lms-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-lms-db
          property: connectionString
      - key: SECRET_KEY
        value: your_super_secret_key_change_in_production_2024
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ALLOWED_ORIGINS
        value: https://smart-lms-frontend.onrender.com

  # Frontend Static Site
  - type: web
    name: smart-lms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://smart-lms-backend.onrender.com

databases:
  # PostgreSQL Database
  - name: smart-lms-db
    plan: free
    databaseName: smart_lms
    user: postgres